<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billions Game - Stock Market Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a202c 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== COMMON STYLES ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(100, 116, 139, 0.5);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(100, 116, 139, 0.8);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.7);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(239, 68, 68, 1);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 6px;
            padding: 8px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 6px;
            border-left: 3px solid #ef4444;
        }

        .success {
            color: #10b981;
            font-size: 13px;
            margin-top: 6px;
            padding: 8px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 6px;
            border-left: 3px solid #10b981;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        table th {
            background: rgba(15, 23, 42, 0.9);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        table tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #f1f5f9;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(59, 130, 246, 0.5);
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.6);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
            margin-top: 4px;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }

        .stat-change.positive {
            color: #10b981;
        }

        .stat-change.negative {
            color: #ef4444;
        }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo h1 {
            font-size: 32px;
            color: #3b82f6;
            margin-bottom: 8px;
        }

        .login-logo p {
            font-size: 14px;
            color: #94a3b8;
        }

        /* ===== GAME SCREEN ===== */
        #gameScreen {
            display: none;
        }

        .header {
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding: 16px 0;
            margin-bottom: 24px;
            sticky: top 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-left h2 {
            font-size: 20px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .header-stats {
            display: flex;
            gap: 30px;
            font-size: 14px;
        }

        .header-stat {
            text-align: center;
        }

        .header-stat-label {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
        }

        .header-stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #f1f5f9;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            gap: 12px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .grid-full {
            grid-column: 1 / -1;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #f1f5f9;
        }

        .modal-close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #94a3b8;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: #e2e8f0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .card {
                padding: 16px;
            }

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            .header-stats {
                flex-direction: column;
                gap: 12px;
            }

            .login-card {
                padding: 24px;
            }

            table {
                font-size: 12px;
            }

            table th,
            table td {
                padding: 8px;
            }
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
            align-items: flex-end;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-logo">
                <h1>💰 BILLIONS</h1>
                <p>Stock Market Simulator</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="teamId">Team ID</label>
                    <input type="text" id="teamId" placeholder="e.g., TEAM-000001" required>
                </div>
                <div class="input-group">
                    <label for="teamPassword">Password</label>
                    <input type="password" id="teamPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                    <span id="loginBtn">LOGIN</span>
                </button>
                <div id="loginError"></div>
            </form>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen">
        <!-- HEADER -->
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <h2 id="teamName">Team Name</h2>
                </div>
                <div class="header-stats">
                    <div class="header-stat">
                        <div class="header-stat-label">Round</div>
                        <div class="header-stat-value" id="currentRound">1/5</div>
                    </div>
                    <div class="header-stat">
                        <div class="header-stat-label">Portfolio Value</div>
                        <div class="header-stat-value" id="portfolioValue">$0</div>
                    </div>
                    <div class="header-stat">
                        <div class="header-stat-label">Cash Balance</div>
                        <div class="header-stat-value" id="cashBalance">$0</div>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-secondary" onclick="app.logout()">Logout</button>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="container">
            <!-- PORTFOLIO & TRADING -->
            <div class="grid-2">
                <!-- PORTFOLIO -->
                <div>
                    <div class="card">
                        <div class="section-title">📊 Portfolio</div>
                        <div class="stat-box">
                            <div class="stat-label">Total Value</div>
                            <div class="stat-value" id="totalValue">$0</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Cash Balance</div>
                            <div class="stat-value" id="cashValue">$0</div>
                        </div>
                        <table id="portfolioTable" style="margin-top: 16px;">
                            <thead>
                                <tr>
                                    <th>Asset</th>
                                    <th>Qty</th>
                                    <th>Price</th>
                                    <th>Value</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- TRADING PANEL -->
                <div>
                    <div class="card">
                        <div class="section-title">💼 Place Trades</div>
                        <form id="tradeForm" onsubmit="app.addTrade(event)">
                            <div class="form-row">
                                <div class="input-group">
                                    <label for="assetId">Asset</label>
                                    <select id="assetId" required>
                                        <option value="">Select Asset</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <label for="action">Action</label>
                                    <select id="action" required>
                                        <option value="BUY">BUY</option>
                                        <option value="SELL">SELL</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <label for="quantity">Qty</label>
                                    <input type="number" id="quantity" min="1" placeholder="10" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">
                                Add Trade
                            </button>
                        </form>
                        <div id="tradeError"></div>

                        <!-- PENDING TRADES -->
                        <div style="margin-top: 20px;">
                            <div class="section-title">Pending Trades</div>
                            <table id="tradesTable">
                                <thead>
                                    <tr>
                                        <th>Asset</th>
                                        <th>Action</th>
                                        <th>Qty</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="tradesBody">
                                </tbody>
                            </table>
                            <div id="netCashBox" class="stat-box" style="margin-top: 12px;">
                                <div class="stat-label">Net Cash After Trades</div>
                                <div class="stat-value" id="netCash">$0</div>
                            </div>
                            <div style="display: flex; gap: 8px; margin-top: 12px;">
                                <button type="button" class="btn btn-primary" onclick="app.submitTrades()" style="flex: 1;">
                                    Submit Trades
                                </button>
                                <button type="button" class="btn btn-danger" onclick="app.clearTrades()" style="flex: 1;">
                                    Clear All
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LEADERBOARD -->
            <div class="card">
                <div class="section-title">🏆 Leaderboard</div>
                <table id="leaderboardTable">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Team Name</th>
                            <th>Portfolio Value</th>
                            <th>Gain</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                    </tbody>
                </table>
                <div style="font-size: 12px; color: #94a3b8; margin-top: 12px;">
                    Last updated: <span id="lastUpdate">--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const API_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwdbeuKMSUpz2DgaygLeW0JQu_vHyoxdx0GNXkGqotTW9jrGOEE6XK9qWRH5JP-0eHfRw/exec';

        // ===== APP STATE =====
        const app = {
            sessionToken: localStorage.getItem('sessionToken'),
            teamId: localStorage.getItem('teamId'),
            teamName: localStorage.getItem('teamName'),
            currentRound: 1,
            maxRounds: 5,
            currentPrices: {},
            holdings: {},
            pendingTrades: [],
            leaderboardRefreshInterval: null,

            // ===== INITIALIZATION =====
            init() {
                if (this.sessionToken && this.teamId) {
                    this.showGame();
                    this.loadPortfolio();
                    this.loadLeaderboard();
                    this.leaderboardRefreshInterval = setInterval(() => this.loadLeaderboard(), 30000);
                } else {
                    this.showLogin();
                    document.getElementById('loginForm').addEventListener('submit', (e) => this.login(e));
                }
            },

            // ===== AUTHENTICATION =====
            async login(event) {
                event.preventDefault();
                const teamId = document.getElementById('teamId').value.trim();
                const teamPassword = document.getElementById('teamPassword').value;
                const loginBtn = document.getElementById('loginBtn');

                loginBtn.innerHTML = '<span class="loading"></span>Logging in...';
                loginBtn.disabled = true;

                try {
                    const response = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        body: JSON.stringify({
                            endpoint: '/login',
                            teamId,
                            teamPassword
                        })
                    });

                    const data = await response.json();

                    if (data.success && data.data.sessionToken) {
                        this.sessionToken = data.data.sessionToken;
                        this.teamId = teamId;
                        this.teamName = data.data.teamName;
                        this.currentRound = data.data.currentRound;
                        this.maxRounds = data.data.maxRounds;
                        this.currentPrices = data.data.currentPrices;
                        this.holdings = data.data.holdings;

                        localStorage.setItem('sessionToken', this.sessionToken);
                        localStorage.setItem('teamId', this.teamId);
                        localStorage.setItem('teamName', this.teamName);

                        this.showGame();
                        this.updateHeader();
                        this.renderPortfolio();
                        this.loadLeaderboard();
                        this.leaderboardRefreshInterval = setInterval(() => this.loadLeaderboard(), 30000);
                    } else {
                        document.getElementById('loginError').innerHTML = 
                            `<div class="error">❌ ${data.error?.message || 'Login failed'}</div>`;
                    }
                } catch (error) {
                    document.getElementById('loginError').innerHTML = 
                        `<div class="error">❌ Connection error. Check your Team ID and password.</div>`;
                    console.error('Login error:', error);
                } finally {
                    loginBtn.innerHTML = 'LOGIN';
                    loginBtn.disabled = false;
                }
            },

            logout() {
                this.sessionToken = null;
                this.teamId = null;
                this.teamName = null;
                this.pendingTrades = [];
                localStorage.removeItem('sessionToken');
                localStorage.removeItem('teamId');
                localStorage.removeItem('teamName');
                clearInterval(this.leaderboardRefreshInterval);
                this.showLogin();
                document.getElementById('loginForm').reset();
            },

            // ===== UI NAVIGATION =====
            showLogin() {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('gameScreen').style.display = 'none';
            },

            showGame() {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('gameScreen').style.display = 'block';
            },

            // ===== PORTFOLIO & PRICES =====
            async loadPortfolio() {
                try {
                    const response = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        body: JSON.stringify({
                            endpoint: '/portfolio',
                            sessionToken: this.sessionToken
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        this.holdings = data.data.holdings;
                        this.currentRound = data.data.round;
                        this.renderPortfolio();
                        this.updateHeader();
                    }
                } catch (error) {
                    console.error('Load portfolio error:', error);
                }
            },

            async loadPrices() {
                try {
                    const response = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        body: JSON.stringify({
                            endpoint: '/prices',
                            sessionToken: this.sessionToken
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        this.currentPrices = data.data;
                    }
                } catch (error) {
                    console.error('Load prices error:', error);
                }
            },

            renderPortfolio() {
                const tbody = document.querySelector('#portfolioTable tbody');
                tbody.innerHTML = '';

                let totalAssetValue = 0;
                const cash = this.holdings[0] || 0;

                for (let assetId = 1; assetId <= 21; assetId++) {
                    const qty = this.holdings[assetId] || 0;
                    if (qty > 0) {
                        const price = this.currentPrices[assetId] || 0;
                        const value = qty * price;
                        totalAssetValue += value;

                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>Asset ${assetId}</td>
                            <td>${qty.toFixed(0)}</td>
                            <td>$${price.toFixed(2)}</td>
                            <td>$${value.toFixed(2)}</td>
                        `;
                        tbody.appendChild(row);
                    }
                }

                const totalValue = totalAssetValue + cash;
                document.getElementById('totalValue').textContent = `$${totalValue.toFixed(2)}`;
                document.getElementById('cashValue').textContent = `$${cash.toFixed(2)}`;
                document.getElementById('portfolioValue').textContent = `$${totalValue.toFixed(2)}`;
                document.getElementById('cashBalance').textContent = `$${cash.toFixed(2)}`;

                this.updateNetCash();
            },

            updateHeader() {
                document.getElementById('teamName').textContent = this.teamName;
                document.getElementById('currentRound').textContent = `${this.currentRound}/${this.maxRounds}`;
            },

            // ===== TRADING =====
            async addTrade(event) {
                event.preventDefault();
                const assetId = parseInt(document.getElementById('assetId').value);
                const action = document.getElementById('action').value;
                const quantity = parseInt(document.getElementById('quantity').value);

                const errorDiv = document.getElementById('tradeError');
                errorDiv.innerHTML = '';

                if (action === 'SELL') {
                    const owned = this.holdings[assetId] || 0;
                    if (quantity > owned) {
                        errorDiv.innerHTML = `<div class="error">❌ Cannot sell ${quantity}, you only own ${owned}</div>`;
                        return;
                    }
                }

                this.pendingTrades.push({ assetId, action, quantity });
                document.getElementById('tradeForm').reset();
                this.renderPendingTrades();
            },

            renderPendingTrades() {
                const tbody = document.getElementById('tradesBody');
                tbody.innerHTML = '';

                this.pendingTrades.forEach((trade, index) => {
                    const row = document.createElement('tr');
                    const actionColor = trade.action === 'BUY' ? '#10b981' : '#ef4444';
                    row.innerHTML = `
                        <td>Asset ${trade.assetId}</td>
                        <td><span style="color: ${actionColor}; font-weight: 600;">${trade.action}</span></td>
                        <td>${trade.quantity}</td>
                        <td>
                            <button class="btn btn-danger" style="padding: 4px 8px; font-size: 12px;" 
                                onclick="app.removeTrade(${index})">Remove</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                this.updateNetCash();
            },

            removeTrade(index) {
                this.pendingTrades.splice(index, 1);
                this.renderPendingTrades();
            },

            clearTrades() {
                this.pendingTrades = [];
                this.renderPendingTrades();
            },

            updateNetCash() {
                let totalCost = 0;
                const cash = this.holdings[0] || 0;

                this.pendingTrades.forEach(trade => {
                    const price = this.currentPrices[trade.assetId] || 0;
                    if (trade.action === 'BUY') {
                        totalCost += trade.quantity * price;
                    } else {
                        totalCost -= trade.quantity * price;
                    }
                });

                const netCash = cash - totalCost;
                document.getElementById('netCash').textContent = `$${netCash.toFixed(2)}`;

                if (netCash < 0) {
                    document.getElementById('netCashBox').style.color = '#ef4444';
                } else {
                    document.getElementById('netCashBox').style.color = '#f1f5f9';
                }
            },

            async submitTrades() {
                if (this.pendingTrades.length === 0) {
                    document.getElementById('tradeError').innerHTML = 
                        '<div class="error">❌ No trades to submit</div>';
                    return;
                }

                const submitBtn = event.target;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loading"></span>Submitting...';

                try {
                    const response = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        body: JSON.stringify({
                            endpoint: '/trade',
                            sessionToken: this.sessionToken,
                            trades: this.pendingTrades
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        this.holdings = data.data.holdings;
                        this.pendingTrades = [];
                        document.getElementById('tradeError').innerHTML = 
                            '<div class="success">✅ Trades submitted successfully!</div>';
                        this.renderPortfolio();
                        this.renderPendingTrades();
                        this.loadLeaderboard();
                        setTimeout(() => {
                            document.getElementById('tradeError').innerHTML = '';
                        }, 3000);
                    } else {
                        document.getElementById('tradeError').innerHTML = 
                            `<div class="error">❌ ${data.error?.message || 'Trade failed'}</div>`;
                    }
                } catch (error) {
                    document.getElementById('tradeError').innerHTML = 
                        '<div class="error">❌ Connection error. Please try again.</div>';
                    console.error('Submit trades error:', error);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Submit Trades';
                }
            },

            // ===== LEADERBOARD =====
            async loadLeaderboard() {
                try {
                    const response = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        body: JSON.stringify({
                            endpoint: '/leaderboard',
                            sessionToken: this.sessionToken
                        })
                    });

                    const data = response.json();
                    if ((await data).success) {
                        this.renderLeaderboard((await data).data);
                    }
                } catch (error) {
                    console.error('Load leaderboard error:', error);
                }
            },

            renderLeaderboard(leaderboard) {
                const tbody = document.getElementById('leaderboardBody');
                tbody.innerHTML = '';

                (leaderboard || []).slice(0, 100).forEach((team, index) => {
                    const row = document.createElement('tr');
                    const gainColor = team.gain >= 0 ? '#10b981' : '#ef4444';
                    const gainSign = team.gain >= 0 ? '+' : '';
                    
                    row.innerHTML = `
                        <td><strong>#${index + 1}</strong></td>
                        <td>${team.teamName}${team.teamId === this.teamId ? ' <span class="badge">YOU</span>' : ''}</td>
                        <td>$${parseFloat(team.finalValue || 0).toFixed(2)}</td>
                        <td style="color: ${gainColor};">${gainSign}${parseFloat(team.gain || 0).toFixed(2)}%</td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('lastUpdate').textContent = 
                    new Date().toLocaleTimeString();
            }
        };

        // ===== POPULATE ASSET DROPDOWN =====
        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('assetId');
            for (let i = 1; i <= 21; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Asset ${i}`;
                select.appendChild(option);
            }
            app.init();
        });
    </script>
</body>
</html>
